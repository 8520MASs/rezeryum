<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Napcaz</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink: #E91E8C;
      --pink-dark: #c0156f;
      --pink-light: #f9c6e3;
      --green: #4CAF50;
      --black: #111;
      --white: #fff;
      --gray: #f4f4f4;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--gray);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .screen.active { display: flex; }

    /* LOADING */
    #screen-loading {
      background: var(--pink);
    }
    #screen-loading .logo {
      font-size: 52px;
      font-weight: 900;
      color: white;
      letter-spacing: -2px;
    }
    #screen-loading .logo span { opacity: 0.6; }
    #screen-loading p {
      color: rgba(255,255,255,0.7);
      margin-top: 16px;
      font-size: 16px;
    }

    /* LOGIN */
    #screen-login {
      background: var(--pink);
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .login-card h2 {
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 24px;
      color: var(--black);
    }
    .login-logo {
      font-size: 42px;
      font-weight: 900;
      color: white;
      letter-spacing: -2px;
      text-align: center;
      margin-bottom: 28px;
    }
    .input-group {
      border: 3px solid var(--green);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .input-group label {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
    }
    .input-group input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      margin-top: 4px;
      color: var(--black);
    }
    .btn-green {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      width: 100%;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: background 0.2s;
    }
    .btn-green:hover { background: #388e3c; }
    .error-msg {
      color: red;
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      display: none;
    }

    /* MAIN */
    #screen-main {
      background: var(--gray);
      justify-content: flex-start;
      padding: 0;
    }

    .top-bar {
      background: white;
      width: 100%;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .top-bar .title {
      font-size: 20px;
      font-weight: 900;
      color: var(--black);
    }
    .top-bar .firm-name {
      font-size: 13px;
      color: var(--pink);
      font-weight: 700;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      background: white;
      width: 100%;
      border-bottom: 1px solid #eee;
    }
    .filter-btn {
      padding: 7px 18px;
      border-radius: 20px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      background: #eee;
      color: #555;
    }
    .filter-btn.active {
      background: var(--pink);
      color: white;
    }

    .jobs-list {
      width: 100%;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .job-card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .job-card:hover { transform: translateY(-1px); }

    .job-num {
      background: var(--black);
      color: white;
      border-radius: 10px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 13px;
      flex-shrink: 0;
      flex-direction: column;
      line-height: 1;
    }
    .job-num span { font-size: 9px; font-weight: 400; opacity: 0.7; }

    .job-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--black);
      flex: 1;
    }

    .job-done-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      background: #e8f5e9;
      color: var(--green);
    }
    .job-pending-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      background: #fce4ec;
      color: var(--pink);
    }

    .fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--pink);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 900;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(233,30,140,0.4);
      transition: all 0.2s;
    }
    .fab:hover { background: var(--pink-dark); transform: translateY(-2px); }

    .empty-state {
      text-align: center;
      color: #aaa;
      margin-top: 48px;
      font-size: 15px;
    }
    .empty-state div { font-size: 48px; margin-bottom: 12px; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      justify-content: center;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--pink);
      width: 100%;
      max-width: 420px;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px;
    }
    .modal h3 {
      color: white;
      font-size: 20px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 20px;
    }
    .modal textarea {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      resize: none;
      height: 140px;
      outline: none;
      color: var(--black);
    }
    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn-cancel {
      flex: 1;
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
    }
    .btn-submit {
      flex: 2;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 900;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
    }

    /* JOB DETAIL MODAL */
    .detail-modal {
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px;
      width: 100%;
      max-width: 420px;
    }
    .detail-modal h3 {
      font-size: 20px;
      font-weight: 900;
      color: var(--black);
      margin-bottom: 8px;
    }
    .detail-modal .note-text {
      color: #555;
      font-size: 14px;
      background: var(--gray);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 20px;
      min-height: 60px;
    }
    .toggle-done-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 900;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .toggle-done-btn.mark-done { background: var(--green); color: white; }
    .toggle-done-btn.mark-undone { background: #eee; color: #555; }
    .delete-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      background: #fce4ec;
      color: var(--pink);
    }

    .logout-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      font-weight: 700;
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="screen active">
  <div class="logo">?<span>N</span>apcaz</div>
  <p>Yükleniyor...</p>
</div>

<!-- LOGIN -->
<div id="screen-login" class="screen">
  <div class="login-logo">?Napcaz</div>
  <div class="login-card">
    <h2>Giriş Yap</h2>
    <div class="input-group">
      <label>İşletme Kodu</label>
      <input type="text" id="code-input" placeholder="kod yazın..." autocomplete="off"/>
    </div>
    <button class="btn-green" onclick="doLogin()">GİRİŞ YAP</button>
    <div class="error-msg" id="login-error">Kod bulunamadı veya geçersiz!</div>
  </div>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">
  <div class="top-bar">
    <div>
      <div class="title">İşler</div>
      <div class="firm-name" id="firm-label"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Çıkış</button>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">Tümü</button>
    <button class="filter-btn" id="filter-pending" onclick="setFilter('pending')">Yapılmayan</button>
    <button class="filter-btn" id="filter-done" onclick="setFilter('done')">Yapılan</button>
  </div>
  <div class="jobs-list" id="jobs-list">
    <div class="empty-state"><div>📋</div>Henüz iş yok</div>
  </div>
  <button class="fab" onclick="openAddModal()">+ Yeni İş Ekle</button>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>Yeni İş Ekle</h3>
    <textarea id="new-job-note" placeholder="İş için not yazın..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">İptal</button>
      <button class="btn-submit" onclick="addJob()">İŞİ ONAYLA</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="detail-modal">
    <h3 id="detail-title"></h3>
    <div class="note-text" id="detail-note"></div>
    <button class="toggle-done-btn" id="toggle-done-btn" onclick="toggleDone()"></button>
    <button class="delete-btn" onclick="deleteJob()">Sil</button>
    <button class="btn-cancel" style="width:100%;margin-top:10px;background:#eee;color:#555;border-radius:12px;padding:12px;border:none;font-weight:700;font-family:Nunito,sans-serif;cursor:pointer;" onclick="closeDetailModal()">Kapat</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, addDoc, getDocs, updateDoc, deleteDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyApvlBOXpiAfI19koDsAmo1WTSsy5UNUh8",
    authDomain: "napcaz-b9c05.firebaseapp.com",
    projectId: "napcaz-b9c05",
    storageBucket: "napcaz-b9c05.firebasestorage.app",
    messagingSenderId: "735744706879",
    appId: "1:735744706879:web:3324d9072c805db5362b8a",
    measurementId: "G-Z931K0ZFDT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let currentFirm = null;
  let currentFilter = 'all';
  let allJobs = [];
  let selectedJobId = null;

  // ---- SCREENS ----
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // Simulated loading
  setTimeout(() => {
    const saved = localStorage.getItem('napcaz_firm');
    if (saved) {
      currentFirm = saved;
      document.getElementById('firm-label').textContent = saved.toUpperCase();
      showScreen('screen-main');
      loadJobs();
    } else {
      showScreen('screen-login');
    }
  }, 1200);

  // ---- LOGIN ----
  window.doLogin = async function() {
    const code = document.getElementById('code-input').value.trim().toLowerCase();
    if (!code) return;

    // Firestore'da bu koda ait işletme var mı kontrol et
    // Yoksa otomatik oluştur (ilk girişte)
    currentFirm = code;
    localStorage.setItem('napcaz_firm', code);
    document.getElementById('firm-label').textContent = code.toUpperCase();
    showScreen('screen-main');
    loadJobs();
  }

  window.doLogout = function() {
    localStorage.removeItem('napcaz_firm');
    currentFirm = null;
    allJobs = [];
    document.getElementById('code-input').value = '';
    showScreen('screen-login');
  }

  // ---- JOBS ----
  async function loadJobs() {
    const q = query(collection(db, 'jobs'), where('firm', '==', currentFirm));
    const snap = await getDocs(q);
    allJobs = [];
    snap.forEach(d => allJobs.push({ id: d.id, ...d.data() }));
    // Alfabetik sırala
    allJobs.sort((a, b) => a.note.localeCompare(b.note, 'tr'));
    renderJobs();
  }

  function renderJobs() {
    const list = document.getElementById('jobs-list');
    let filtered = allJobs;
    if (currentFilter === 'pending') filtered = allJobs.filter(j => !j.done);
    if (currentFilter === 'done') filtered = allJobs.filter(j => j.done);

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state"><div>📋</div>Henüz iş yok</div>';
      return;
    }

    list.innerHTML = filtered.map((job, i) => `
      <div class="job-card" onclick="openDetail('${job.id}')">
        <div class="job-num"><span>iş</span>${i+1}</div>
        <div class="job-name">${job.note}</div>
        ${job.done
          ? '<div class="job-done-badge">✓ Yapıldı</div>'
          : '<div class="job-pending-badge">Bekliyor</div>'}
      </div>
    `).join('');
  }

  // ---- ADD ----
  window.openAddModal = function() {
    document.getElementById('new-job-note').value = '';
    document.getElementById('add-modal').classList.add('open');
  }
  window.closeAddModal = function() {
    document.getElementById('add-modal').classList.remove('open');
  }

  window.addJob = async function() {
    const note = document.getElementById('new-job-note').value.trim();
    if (!note) return;
    await addDoc(collection(db, 'jobs'), {
      firm: currentFirm,
      note: note,
      done: false,
      createdAt: Date.now()
    });
    closeAddModal();
    loadJobs();
  }

  // ---- DETAIL ----
  window.openDetail = function(id) {
    selectedJobId = id;
    const job = allJobs.find(j => j.id === id);
    document.getElementById('detail-title').textContent = job.note;
    document.getElementById('detail-note').textContent = job.note;
    const btn = document.getElementById('toggle-done-btn');
    if (job.done) {
      btn.textContent = '↩ Yapılmadı Olarak İşaretle';
      btn.className = 'toggle-done-btn mark-undone';
    } else {
      btn.textContent = '✓ Yapıldı Olarak İşaretle';
      btn.className = 'toggle-done-btn mark-done';
    }
    document.getElementById('detail-modal').classList.add('open');
  }
  window.closeDetailModal = function() {
    document.getElementById('detail-modal').classList.remove('open');
    selectedJobId = null;
  }

  window.toggleDone = async function() {
    const job = allJobs.find(j => j.id === selectedJobId);
    await updateDoc(doc(db, 'jobs', selectedJobId), { done: !job.done });
    closeDetailModal();
    loadJobs();
  }

  window.deleteJob = async function() {
    if (!confirm('Bu işi silmek istediğine emin misin?')) return;
    await deleteDoc(doc(db, 'jobs', selectedJobId));
    closeDetailModal();
    loadJobs();
  }

  // ---- FILTER ----
  window.setFilter = function(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('filter-' + f).classList.add('active');
    renderJobs();
  }
</script>
</body>
</html>
